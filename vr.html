<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0,
                 user-scalable=no, viewport-fit=cover">
  <meta name="description" content="OptoMeasure — VR Patient View (+8.0 D)">
  <title>OptoMeasure · VR</title>
  <link rel="stylesheet" href="vr.css">
</head>
<body>

  <!-- ── CONNECTION OVERLAY ──────────────────────────────────────────── -->
  <div class="connect-overlay" id="connectOverlay">

    <!-- Animated background -->
    <div class="ov-ring ov-ring-1"></div>
    <div class="ov-ring ov-ring-2"></div>
    <div class="ov-ring ov-ring-3"></div>
    <div class="ov-grid"></div>

    <div class="ov-card">

      <!-- Animated eye icon -->
      <div class="ov-icon-wrap">
        <div class="ov-icon-orbit orbit-1"></div>
        <div class="ov-icon-orbit orbit-2"></div>
        <div class="ov-icon">🥽</div>
      </div>

      <div class="ov-title">VR Patient View</div>
      <div class="ov-lens-badge">+8.0 D lens · image ~36 cm</div>
      <p class="ov-instruction">Show this code to the Controller phone</p>

      <!-- Room code display -->
      <div class="code-display-wrap">
        <div class="code-display" id="roomCode">------</div>
        <button class="copy-btn" id="btnCopy" title="Copy">
          <span class="copy-icon">📋</span>
        </button>
      </div>

      <!-- Status line -->
      <div class="status-line" id="connectStatus">
        <div class="status-dot waiting" id="statusDot"></div>
        <span id="statusText">Waiting for controller…</span>
      </div>

      <!-- Signal bars (decorative, animate while waiting) -->
      <div class="signal-bars">
        <div class="bar b1"></div>
        <div class="bar b2"></div>
        <div class="bar b3"></div>
        <div class="bar b4"></div>
      </div>

    </div>
  </div>

  <!-- ── VR SPLIT SCREEN ─────────────────────────────────────────────── -->
  <div class="vr-container" id="vrContainer">

    <!-- Left eye — horizontal line -->
    <div class="eye-view" id="leftEye">
      <div class="eye-content" id="leftContent">
        <div class="h-line-left"  id="hLineLeft"></div>
        <div class="center-dot"   id="dotLeft"></div>
        <div class="h-line-right" id="hLineRight"></div>
      </div>
    </div>

    <!-- Divider -->
    <div class="vr-divider"></div>

    <!-- Right eye — vertical line -->
    <div class="eye-view" id="rightEye">
      <div class="eye-content" id="rightContent">
        <div class="v-line-top"    id="vLineTop"></div>
        <div class="center-dot"    id="dotRight"></div>
        <div class="v-line-bottom" id="vLineBottom"></div>
      </div>
    </div>

  </div>

  <!-- Tiny connection dot -->
  <div class="conn-indicator" id="connIndicator"></div>

  <!-- Debug overlay (press 'd') -->
  <pre class="debug-overlay" id="debugOverlay" style="display:none"></pre>

  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script src="shared.js"></script>
  <script src="vr.js"></script>
</body>
</html>
